<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI购物助手 · 建议型</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #2563EB; --blue-light: #EFF6FF; --blue-mid: #DBEAFE;
    --text: #1E293B; --muted: #64748B; --border: #E2E8F0; --white: #FFFFFF;
    --green: #16A34A; --green-light: #F0FDF4; --red: #DC2626; --amber: #D97706;
  }
  body { font-family: -apple-system,"PingFang SC","Hiragino Sans GB",sans-serif; background:#F8FAFC; color:var(--text); min-height:100vh; }
  .study-badge { background:var(--amber); color:white; text-align:center; padding:8px 16px; font-size:13px; font-weight:500; }
  .header { background:var(--white); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
  .header-icon { width:36px; height:36px; background:var(--blue); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .header-title { font-size:15px; font-weight:700; }
  .header-sub { font-size:12px; color:var(--muted); margin-top:1px; }
  .type-tag { margin-left:auto; background:var(--blue-light); color:var(--blue); border:1px solid var(--blue-mid); border-radius:20px; padding:4px 10px; font-size:12px; font-weight:600; }
  .container { max-width:520px; margin:0 auto; padding:20px 16px 60px; }
  .step-indicator { display:flex; align-items:center; margin-bottom:20px; }
  .step-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:var(--border); color:var(--muted); flex-shrink:0; transition:all 0.3s; }
  .step-dot.active { background:var(--blue); color:white; }
  .step-dot.done { background:var(--green); color:white; }
  .step-line { flex:1; height:2px; background:var(--border); transition:background 0.3s; }
  .step-line.done { background:var(--green); }
  .chat-area { display:flex; flex-direction:column; gap:14px; margin-bottom:20px; min-height:120px; }
  .bubble-wrap { display:flex; align-items:flex-end; gap:8px; animation:fadeUp 0.35s ease; }
  .bubble-wrap.user { flex-direction:row-reverse; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .avatar { width:32px; height:32px; border-radius:50%; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .avatar.user-av { background:#94A3B8; }
  .bubble { max-width:78%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.55; }
  .bubble.ai { background:var(--white); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .bubble.user { background:var(--blue); color:white; border-bottom-right-radius:4px; }
  .bubble strong { font-weight:600; }
  .product-list { display:flex; flex-direction:column; gap:10px; margin-top:6px; }
  .product-card { background:var(--white); border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; cursor:pointer; transition:all 0.2s; position:relative; }
  .product-card:hover { border-color:var(--blue); transform:translateY(-1px); }
  .product-card.selected { border-color:var(--blue); background:var(--blue-light); }
  .product-card.recommended::before { content:"AI推荐"; position:absolute; top:-1px; right:12px; background:var(--blue); color:white; font-size:11px; font-weight:600; padding:2px 8px; border-radius:0 0 6px 6px; }
  .product-name { font-size:14px; font-weight:600; margin-bottom:4px; }
  .product-meta { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .product-price { font-size:16px; font-weight:700; color:var(--red); }
  .product-tags { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
  .tag { background:var(--blue-light); color:var(--blue); font-size:11px; padding:2px 7px; border-radius:4px; font-weight:500; }
  .action-area { margin-top:8px; }
  .btn { padding:10px 18px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; font-family:inherit; }
  .btn-green { background:var(--green); color:white; } .btn-green:hover { background:#15803D; }
  .btn-ghost { background:var(--border); color:var(--muted); } .btn-ghost:hover { background:#CBD5E1; }
  .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
  .option-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .option-btn { padding:10px 12px; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--text); transition:all 0.2s; font-family:inherit; text-align:center; }
  .option-btn:hover { border-color:var(--blue); background:var(--blue-light); color:var(--blue); }
  .summary-box { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-top:8px; }
  .summary-row { display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:4px 0; border-bottom:1px solid var(--border); }
  .summary-row:last-child { border-bottom:none; }
  .summary-label { color:var(--muted); }
  .summary-value { font-weight:500; }
  .summary-price { font-size:18px; font-weight:700; color:var(--red); }
  .notice { background:var(--blue-light); border:1px solid var(--blue-mid); border-left:3px solid var(--blue); border-radius:8px; padding:10px 14px; font-size:12.5px; color:#1E3A8A; line-height:1.5; margin-top:10px; }
  .success-box { background:var(--green-light); border:1px solid #BBF7D0; border-radius:12px; padding:20px; text-align:center; }
  .success-icon { font-size:40px; margin-bottom:8px; }
  .success-title { font-size:17px; font-weight:700; color:var(--green); margin-bottom:6px; }
  .success-sub { font-size:13px; color:var(--muted); line-height:1.6; }
  .typing { display:inline-flex; align-items:center; gap:4px; padding:4px 0; }
  .typing span { width:7px; height:7px; background:var(--muted); border-radius:50%; animation:blink 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .section-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
  .choice-emphasis { background:white; border:2px dashed var(--blue); border-radius:12px; padding:14px 16px; margin-top:10px; text-align:center; }
  .choice-emphasis p { font-size:13px; color:var(--muted); line-height:1.5; }
</style>
</head>
<body>
<div class="study-badge">📋 实验材料 · 请认真体验以下流程，完成后回到问卷继续作答</div>
<div class="header">
  <div class="header-icon">🤖</div>
  <div><div class="header-title">AI购物助手</div><div class="header-sub">智能推荐 · 你来决定</div></div>
  <div class="type-tag">建议型</div>
</div>
<div class="container">
  <div class="step-indicator" id="stepIndicator">
    <div class="step-dot active" id="dot1">1</div><div class="step-line" id="line1"></div>
    <div class="step-dot" id="dot2">2</div><div class="step-line" id="line2"></div>
    <div class="step-dot" id="dot3">3</div><div class="step-line" id="line3"></div>
    <div class="step-dot" id="dot4">4</div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="action-area" id="actionArea"></div>
</div>

<script>

    reason:'调音均衡偏暖，同价位音质最好，居家听歌看剧体验远超百元竞品，延迟低适合影音。' },
  { id:'p4', name:'QCY AilyBuds Pro', meta:'入耳式 · 蓝牙5.4 · 续航10h+30h', price:599, priceStr:'¥599',
    tags:['AI自适应降噪','高清通话','长续航'],
    fit:{ 通勤:3,运动:2,居家:3,影音:2, 降噪:3,音质:2,续航:3,佩戴:2 },
    reason:'AI自适应降噪根据环境实时调整，地铁噪音压制出色，40小时总续航在千元内极为少见。' },

    tags:['多点连接','通话专业','IPX5防水'],
    fit:{ 通勤:2,运动:3,居家:2,影音:1, 降噪:2,音质:2,续航:2,佩戴:3 },
    reason:'四麦克风阵列通话降噪业界一流，IPX5防水可应对汗水和小雨，运动商务两用首选。' },

  { id:'p8', name:'Bose QuietComfort Earbuds II', meta:'入耳式 · 蓝牙5.3 · 续航6h+18h', price:1699, priceStr:'¥1,699',
    tags:['CustomTune降噪','舒适佩戴','通透模式'],
    fit:{ 通勤:3,运动:1,居家:3,影音:2, 降噪:3,音质:2,续航:2,佩戴:3 },
    reason:'CustomTune实时测量耳道形态，降噪自动优化，长时间佩戴不疲劳，通勤专注工作神器。' },
  { id:'p9', name:'索尼 WF-1000XM5', meta:'入耳式 · 蓝牙5.3 · 续航8h+24h', price:1599, priceStr:'¥1,599',

  { id:'p11', name:'Bose QuietComfort 45', meta:'头戴式 · 蓝牙5.1 · 续航24h', price:2499, priceStr:'¥2,499',
    tags:['Bose降噪','轻盈舒适','通透模式'],

    reason:'头戴式里最轻之一，耳罩柔软透气，长时间佩戴零负担，Bose降噪稳定不受环境干扰。' },
  { id:'p12', name:'森海塞尔 Momentum 4', meta:'头戴式 · 蓝牙5.2 · 续航60h', price:2199, priceStr:'¥2,199',
    tags:['60h超长续航','Hi-Fi旗舰','折叠设计'],
    fit:{ 通勤:2,运动:1,居家:3,影音:3, 降噪:2,音质:3,续航:3,佩戴:3 },
    reason:'60小时续航行业第一，森海塞尔旗舰调音人声醇厚、低频温暖，长时间听音乐不疲劳。' },
];

const BUDGET_MAP = {
  '500元以下':   ['p1','p2','p3'],
  '500-1000元':  ['p4','p5','p6'],
  '1000-2000元': ['p7','p8','p9'],
  '2000元以上':  ['p10','p11','p12'],
};
const SCENARIO_KEY = { '通勤上班':'通勤','运动健身':'运动','居家办公':'居家','影音娱乐':'影音' };
const PREF_KEY     = { '降噪效果':'降噪','音质表现':'音质','续航时长':'续航','佩戴舒适':'佩戴' };

function getRecommendedProducts(budget, scenario, pref) {
  const ids = BUDGET_MAP[budget] || BUDGET_MAP['500元以下'];
  const sk = SCENARIO_KEY[scenario] || '通勤';
  const pk = PREF_KEY[pref] || '降噪';
  const scored = ids.map(id => {
    const p = PRODUCT_POOL.find(x => x.id === id);
    return { ...p, score: (p.fit[sk]||1)*2 + (p.fit[pk]||1)*2 };
  });
  scored.sort((a,b) => b.score - a.score);
  scored.forEach((p,i) => p.recommended = i === 0);
  return scored;
}

// ── State ──────────────────────────────────────────────────────────
const state = { scenario:'', budget:'', preference:'', selectedProduct:null, currentProducts:[] };

const chatArea   = document.getElementById('chatArea');
const actionArea = document.getElementById('actionArea');

// ── Helpers ────────────────────────────────────────────────────────
function addBubble(html, isUser=false) {
  return new Promise(resolve => {
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap${isUser?' user':''}`;
    wrap.innerHTML = `<div class="avatar${isUser?' user-av':''}">🤖</div><div class="bubble ${isUser?'user':'ai'}">${html}</div>`;
    if (isUser) wrap.children[0].textContent = '👤';
    chatArea.appendChild(wrap);
    chatArea.scrollIntoView({behavior:'smooth',block:'end'});
    resolve();
  });
}

function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

function showTyping() {
  const w=document.createElement('div'); w.className='bubble-wrap'; w.id='typingBubble';
  w.innerHTML='<div class="avatar">🤖</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatArea.appendChild(w); chatArea.scrollIntoView({behavior:'smooth',block:'end'});
}
function removeTyping() { const t=document.getElementById('typingBubble'); if(t) t.remove(); }
function setAction(html) { actionArea.innerHTML=html; }

function updateStep(s) {
  for(let i=1;i<=4;i++){
    const d=document.getElementById(`dot${i}`);
    if(i<s){d.className='step-dot done';d.textContent='✓';}
    else if(i===s){d.className='step-dot active';d.textContent=i;}
    else{d.className='step-dot';d.textContent=i;}
  }
  for(let i=1;i<=3;i++) document.getElementById(`line${i}`).className=`step-line${i<s?' done':''}`;
}

// ── Flow ───────────────────────────────────────────────────────────
async function step0() {
  updateStep(1);
  showTyping(); await wait(900); removeTyping();
  await addBubble('你好！我是 <strong>AI购物助手</strong> 🎧<br><br>我会根据你的需求，在平台上为你<strong>筛选并推荐</strong>最适合的蓝牙耳机，并告诉你推荐理由。<br><br><strong>最终购买哪一款，完全由你自己决定。</strong>');
  setAction(`
    <div class="notice"><strong>💡 温馨提示：</strong>我只提供「建议」和「推荐」，不会替你做决定，也不会自动下单。</div>
    <div style="margin-top:12px">
      <div class="section-label">你的使用场景是？</div>
      <div class="option-grid">
        <button class="option-btn" onclick="pickScenario('通勤上班')">🚇 通勤上班</button>
        <button class="option-btn" onclick="pickScenario('运动健身')">🏃 运动健身</button>
        <button class="option-btn" onclick="pickScenario('居家办公')">🏠 居家办公</button>
        <button class="option-btn" onclick="pickScenario('影音娱乐')">🎬 影音娱乐</button>
      </div>
    </div>`);
}

async function pickScenario(v) {
  state.scenario=v; setAction('');
  await addBubble(`使用场景：${v}`,true);
  showTyping(); await wait(600); removeTyping();
  await addBubble(`好的，<strong>${v}</strong> 场景已记录 ✅<br><br>请问你的预算大概是多少？`);
  setAction(`<div class="option-grid">
    <button class="option-btn" onclick="pickBudget('500元以下')">💰 500元以下</button>
    <button class="option-btn" onclick="pickBudget('500-1000元')">💰 500–1000元</button>
    <button class="option-btn" onclick="pickBudget('1000-2000元')">💰 1000–2000元</button>
    <button class="option-btn" onclick="pickBudget('2000元以上')">💰 2000元以上</button>
  </div>`);
}

async function pickBudget(v) {
  state.budget=v; setAction('');
  await addBubble(`预算范围：${v}`,true);
  updateStep(2);
  showTyping(); await wait(600); removeTyping();
  await addBubble('明白了！最后一个问题：你最看重耳机哪方面的性能？');
  setAction(`<div class="option-grid">
    <button class="option-btn" onclick="pickPref('降噪效果')">🔇 降噪效果</button>
    <button class="option-btn" onclick="pickPref('音质表现')">🎵 音质表现</button>
    <button class="option-btn" onclick="pickPref('续航时长')">🔋 续航时长</button>
    <button class="option-btn" onclick="pickPref('佩戴舒适')">😊 佩戴舒适</button>
  </div>`);
}

async function pickPref(v) {
  state.preference=v; setAction('');
  await addBubble(`最看重：${v}`,true);
  showRecommendations();
}

async function showRecommendations() {
  updateStep(3);
  showTyping(); await wait(1200); removeTyping();
  await addBubble('正在为你筛选平台上的耳机……');
  showTyping(); await wait(1400); removeTyping();

  state.currentProducts = getRecommendedProducts(state.budget, state.scenario, state.preference);

  await addBubble(`根据你的需求（<strong>${state.scenario} · ${state.budget} · 重视${state.preference}</strong>），我为你筛选出以下耳机：<br><br>🌟 <strong>带蓝色「AI推荐」标签的是我认为最符合你条件的选项</strong>，请查看推荐理由后自行判断。`);

  const cardsHtml = state.currentProducts.map(p=>`
    <div class="product-card${p.recommended?' recommended':''}" id="card_${p.id}" onclick="pickProduct('${p.id}')">
      <div class="product-name">${p.name}</div>
      <div class="product-meta">${p.meta}</div>
      <div class="product-price">${p.priceStr}</div>
      <div class="product-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div style="margin-top:8px;font-size:12px;color:#64748B;border-top:1px solid #E2E8F0;padding-top:8px;">💬 ${p.reason}</div>
    </div>`).join('');

  const w=document.createElement('div'); w.className='bubble-wrap'; w.style.animation='fadeUp 0.35s ease';
  w.innerHTML=`<div class="avatar">🤖</div><div style="flex:1"><div class="section-label" style="padding-left:2px">为你筛选的耳机</div><div class="product-list">${cardsHtml}</div></div>`;
  chatArea.appendChild(w);
  chatArea.scrollIntoView({behavior:'smooth',block:'end'});

  setAction(`<div class="choice-emphasis"><p>👆 请查看上方推荐，点击你感兴趣的耳机进行选择<br><strong>最终购买哪款完全由你决定</strong></p></div>`);
}

async function pickProduct(id) {
  const p = state.currentProducts.find(x=>x.id===id);
  state.selectedProduct = p;
  document.querySelectorAll('.product-card').forEach(c=>c.classList.remove('selected'));
  const card = document.getElementById(`card_${id}`);
  if(card) card.classList.add('selected');
  setAction('');
  await addBubble(`我选择：<strong>${p.name}</strong>`,true);
  updateStep(4);
  showTyping(); await wait(700); removeTyping();
  await addBubble(`你选择了 <strong>${p.name}</strong>！这是你的订单详情，请确认是否下单：`);
  setAction(`
    <div class="summary-box">
      <div class="summary-row"><span class="summary-label">商品</span><span class="summary-value">${p.name}</span></div>
      <div class="summary-row"><span class="summary-label">规格</span><span class="summary-value">${p.meta}</span></div>
      <div class="summary-row"><span class="summary-label">数量</span><span class="summary-value">1件</span></div>
      <div class="summary-row"><span class="summary-label">实付金额</span><span class="summary-price">${p.priceStr}</span></div>
    </div>
    <div class="btn-group" style="margin-top:12px">
      <button class="btn btn-green" onclick="placeOrder()" style="flex:1">✅ 确认下单</button>
      <button class="btn btn-ghost" onclick="reselect()">← 重新选择</button>
    </div>`);
}

async function reselect() {
  setAction('');
  await addBubble('好的，我重新来选。',true);
  showTyping(); await wait(500); removeTyping();
  await addBubble('没问题，请在下方重新选择一款 👇');
  const cardsHtml = state.currentProducts.map(p=>`
    <div class="product-card${p.recommended?' recommended':''}" id="card_r_${p.id}" onclick="pickProduct('${p.id}')">
      <div class="product-name">${p.name}</div>
      <div class="product-meta">${p.meta}</div>
      <div class="product-price">${p.priceStr}</div>
      <div class="product-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>`).join('');
  setAction(`<div class="product-list">${cardsHtml}</div>`);
}

async function placeOrder() {
  setAction('');
  await addBubble('订单已提交！',true);
  showTyping(); await wait(800); removeTyping();
  const p=state.selectedProduct;
  const w=document.createElement('div'); w.className='bubble-wrap'; w.style.animation='fadeUp 0.35s ease';
  w.innerHTML=`<div class="avatar">🤖</div>
    <div class="success-box" style="flex:1">
      <div class="success-icon">🎉</div>
      <div class="success-title">下单成功！</div>
      <div class="success-sub"><strong>${p.name}</strong>（${p.priceStr}）已下单<br>预计3–5个工作日送达<br><br>感谢使用AI购物助手，本次推荐仅供参考，最终决定权始终在你手中 ✨</div>
    </div>`;
  chatArea.appendChild(w);
  updateStep(5);
  setAction(`<div class="notice" style="background:#F0FDF4;border-color:#BBF7D0;border-left-color:#16A34A;color:#14532D;">
    <strong>✅ 体验完成！</strong><br>请返回见数问卷，继续完成接下来的量表作答。感谢你的参与！
  </div>`);
  chatArea.scrollIntoView({behavior:'smooth',block:'end'});
}

step0();
</script>
