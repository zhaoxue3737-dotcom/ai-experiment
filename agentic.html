<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI购物代理 · 委托型</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --purple:#7C3AED; --purple-light:#F5F3FF; --purple-mid:#EDE9FE;
    --text:#1E293B; --muted:#64748B; --border:#E2E8F0; --white:#FFFFFF;
    --green:#16A34A; --green-light:#F0FDF4; --red:#DC2626; --amber:#D97706;
  }
  body { font-family:-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif; background:#F8FAFC; color:var(--text); min-height:100vh; }
  .study-badge { background:var(--amber); color:white; text-align:center; padding:8px 16px; font-size:13px; font-weight:500; }
  .header { background:var(--white); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
  .header-icon { width:36px; height:36px; background:var(--purple); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .header-title { font-size:15px; font-weight:700; }
  .header-sub { font-size:12px; color:var(--muted); margin-top:1px; }
  .type-tag { margin-left:auto; background:var(--purple-light); color:var(--purple); border:1px solid var(--purple-mid); border-radius:20px; padding:4px 10px; font-size:12px; font-weight:600; }
  .container { max-width:520px; margin:0 auto; padding:20px 16px 60px; }
  .step-indicator { display:flex; align-items:center; margin-bottom:20px; }
  .step-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:var(--border); color:var(--muted); flex-shrink:0; transition:all 0.3s; }
  .step-dot.active { background:var(--purple); color:white; }
  .step-dot.done { background:var(--green); color:white; }
  .step-line { flex:1; height:2px; background:var(--border); transition:background 0.3s; }
  .step-line.done { background:var(--green); }
  .chat-area { display:flex; flex-direction:column; gap:14px; margin-bottom:20px; min-height:120px; }
  .bubble-wrap { display:flex; align-items:flex-end; gap:8px; animation:fadeUp 0.35s ease; }
  .bubble-wrap.user { flex-direction:row-reverse; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .avatar { width:32px; height:32px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .avatar.user-av { background:#94A3B8; }
  .bubble { max-width:78%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.55; }
  .bubble.ai { background:var(--white); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .bubble.user { background:var(--purple); color:white; border-bottom-right-radius:4px; }
  .bubble strong { font-weight:600; }
  .action-area { margin-top:8px; }
  .btn { padding:10px 18px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; font-family:inherit; }
  .btn-primary { background:var(--purple); color:white; } .btn-primary:hover { background:#6D28D9; }
  .option-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .option-btn { padding:10px 12px; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--text); transition:all 0.2s; font-family:inherit; text-align:center; }
  .option-btn:hover { border-color:var(--purple); background:var(--purple-light); color:var(--purple); }
  .notice { background:var(--purple-light); border:1px solid var(--purple-mid); border-left:3px solid var(--purple); border-radius:8px; padding:10px 14px; font-size:12.5px; color:#4C1D95; line-height:1.5; margin-top:10px; }
  .auth-card { background:white; border:2px solid var(--purple); border-radius:14px; padding:16px; margin-top:8px; }
  .auth-title { font-size:14px; font-weight:700; color:var(--purple); margin-bottom:10px; }
  .auth-row { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px solid var(--border); color:var(--muted); }
  .auth-row:last-of-type { border-bottom:none; }
  .auth-row span:last-child { color:var(--text); font-weight:500; }
  .ai-process-box { background:white; border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
  .process-step { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:13px; color:var(--muted); transition:color 0.4s; }
  .process-step.done { color:var(--green); font-weight:500; }
  .process-step.active { color:var(--purple); font-weight:600; }
  .process-icon { font-size:16px; width:20px; text-align:center; }
  .progress-bar-wrap { background:var(--border); border-radius:4px; height:6px; overflow:hidden; margin-top:10px; }
  .progress-bar { height:100%; background:var(--purple); border-radius:4px; width:0%; transition:width 0.5s ease; }
  .result-card { background:white; border:2px solid var(--green); border-radius:14px; padding:16px; position:relative; }
  .result-badge { position:absolute; top:-1px; left:50%; transform:translateX(-50%); background:var(--green); color:white; font-size:12px; font-weight:700; padding:3px 14px; border-radius:0 0 8px 8px; white-space:nowrap; }
  .result-name { font-size:16px; font-weight:700; margin:14px 0 4px; }
  .result-meta { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .result-price { font-size:20px; font-weight:800; color:var(--red); margin-bottom:10px; }
  .result-reason { background:#F8FAFC; border-radius:8px; padding:10px 12px; font-size:12.5px; color:var(--muted); line-height:1.6; margin-bottom:8px; }
  .result-tags { display:flex; gap:6px; flex-wrap:wrap; }
  .tag { background:var(--purple-light); color:var(--purple); font-size:11px; padding:2px 7px; border-radius:4px; font-weight:500; }
  .success-box { background:var(--green-light); border:1px solid #BBF7D0; border-radius:12px; padding:20px; text-align:center; }
  .success-icon { font-size:40px; margin-bottom:8px; }
  .success-title { font-size:17px; font-weight:700; color:var(--green); margin-bottom:6px; }
  .success-sub { font-size:13px; color:var(--muted); line-height:1.6; }
  .typing { display:inline-flex; align-items:center; gap:4px; padding:4px 0; }
  .typing span { width:7px; height:7px; background:var(--muted); border-radius:50%; animation:blink 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .section-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
</style>
</head>
<body>
<div class="study-badge">📋 实验材料 · 请认真体验以下流程，完成后回到问卷继续作答</div>
<div class="header">
  <div class="header-icon">🤖</div>
  <div><div class="header-title">AI购物代理</div><div class="header-sub">全权委托 · AI替你决定</div></div>
  <div class="type-tag">委托型</div>
</div>
<div class="container">
  <div class="step-indicator" id="stepIndicator">
    <div class="step-dot active" id="dot1">1</div><div class="step-line" id="line1"></div>
    <div class="step-dot" id="dot2">2</div><div class="step-line" id="line2"></div>
    <div class="step-dot" id="dot3">3</div><div class="step-line" id="line3"></div>
    <div class="step-dot" id="dot4">4</div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="action-area" id="actionArea"></div>
</div>

<script>

    reason:'调音均衡偏暖，同价位音质最好，居家听歌看剧体验远超百元竞品，延迟低适合影音。' },

    tags:['AI自适应降噪','高清通话','长续航'],
    fit:{ 通勤:3,运动:2,居家:3,影音:2, 降噪:3,音质:2,续航:3,佩戴:2 },
    reason:'AI自适应降噪根据环境实时调整，地铁噪音压制出色，40小时总续航在千元内极为少见。' },

    tags:['多点连接','通话专业','IPX5防水'],
    fit:{ 通勤:2,运动:3,居家:2,影音:1, 降噪:2,音质:2,续航:2,佩戴:3 },
    reason:'四麦克风阵列通话降噪业界一流，IPX5防水可应对汗水和小雨，运动商务两用首选。' },

    reason:'H2芯片降噪业界顶尖，与苹果设备无缝切换，空间音频看电影身临其境，苹果用户体验最佳。' },
  { id:'p8', name:'Bose QuietComfort Earbuds II', meta:'入耳式 · 蓝牙5.3 · 续航6h+18h', price:1699, priceStr:'¥1,699',
    tags:['CustomTune降噪','舒适佩戴','通透模式'],
    fit:{ 通勤:3,运动:1,居家:3,影音:2, 降噪:3,音质:2,续航:2,佩戴:3 },
    reason:'CustomTune实时测量耳道形态，降噪自动优化，长时间佩戴不疲劳，通勤专注工作神器。' },
  { id:'p9', name:'索尼 WF-1000XM5', meta:'入耳式 · 蓝牙5.3 · 续航8h+24h', price:1599, priceStr:'¥1,599',
    tags:['LDAC无损','降噪旗舰','轻量化'],

    reason:'支持LDAC无损传输，搭配安卓旗舰音质直逼有线，降噪旗舰级，居家影音听歌均拿满分。' },
  { id:'p10', name:'索尼 WH-1000XM5', meta:'头戴式 · 蓝牙5.2 · 续航30h', price:2299, priceStr:'¥2,299',
    tags:['业界最强降噪','30h续航','折叠便携'],
    fit:{ 通勤:3,运动:1,居家:3,影音:3, 降噪:3,音质:3,续航:3,佩戴:2 },
    reason:'八麦克风AI降噪连续三年行业第一，30小时续航适合长途出行，头戴式里性价比与品质的天花板。' },
  { id:'p11', name:'Bose QuietComfort 45', meta:'头戴式 · 蓝牙5.1 · 续航24h', price:2499, priceStr:'¥2,499',
    tags:['Bose降噪','轻盈舒适','通透模式'],
    fit:{ 通勤:2,运动:1,居家:3,影音:2, 降噪:3,音质:2,续航:3,佩戴:3 },
    reason:'头戴式里最轻之一，耳罩柔软透气，长时间佩戴零负担，Bose降噪稳定不受环境干扰。' },
  { id:'p12', name:'森海塞尔 Momentum 4', meta:'头戴式 · 蓝牙5.2 · 续航60h', price:2199, priceStr:'¥2,199',
    tags:['60h超长续航','Hi-Fi旗舰','折叠设计'],
    fit:{ 通勤:2,运动:1,居家:3,影音:3, 降噪:2,音质:3,续航:3,佩戴:3 },
    reason:'60小时续航行业第一，森海塞尔旗舰调音人声醇厚、低频温暖，长时间听音乐不疲劳。' },
];

const BUDGET_MAP = {
  '500元以下':   ['p1','p2','p3'],
  '500-1000元':  ['p4','p5','p6'],
  '1000-2000元': ['p7','p8','p9'],
  '2000元以上':  ['p10','p11','p12'],
};
const SCENARIO_KEY = { '通勤上班':'通勤','运动健身':'运动','居家办公':'居家','影音娱乐':'影音' };
const PREF_KEY     = { '降噪效果':'降噪','音质表现':'音质','续航时长':'续航','佩戴舒适':'佩戴' };

// Returns the single best-matching product for given inputs
function getBestProduct(budget, scenario, pref) {
  const ids = BUDGET_MAP[budget] || BUDGET_MAP['500元以下'];
  const sk = SCENARIO_KEY[scenario] || '通勤';
  const pk = PREF_KEY[pref] || '降噪';
  const scored = ids.map(id => {
    const p = PRODUCT_POOL.find(x=>x.id===id);
    return { ...p, score: (p.fit[sk]||1)*2 + (p.fit[pk]||1)*2 };
  });
  scored.sort((a,b)=>b.score-a.score);
  // Also store runner-up count for credible "evaluated X products" text
  scored[0].poolSize = ids.length;
  return scored[0];
}

// ── State ──────────────────────────────────────────────────────────
const state = { scenario:'', budget:'', preference:'', finalProduct:null };

const chatArea   = document.getElementById('chatArea');
const actionArea = document.getElementById('actionArea');

// ── Helpers ────────────────────────────────────────────────────────
function addBubble(html, isUser=false) {
  return new Promise(resolve=>{
    const w=document.createElement('div'); w.className=`bubble-wrap${isUser?' user':''}`;
    w.innerHTML=`<div class="avatar${isUser?' user-av':''}">🤖</div><div class="bubble ${isUser?'user':'ai'}">${html}</div>`;
    if(isUser) w.children[0].textContent='👤';
    chatArea.appendChild(w); chatArea.scrollIntoView({behavior:'smooth',block:'end'}); resolve();
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function showTyping(){
  const w=document.createElement('div');w.className='bubble-wrap';w.id='typingBubble';
  w.innerHTML='<div class="avatar">🤖</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatArea.appendChild(w);chatArea.scrollIntoView({behavior:'smooth',block:'end'});
}
function removeTyping(){const t=document.getElementById('typingBubble');if(t)t.remove();}
function setAction(html){actionArea.innerHTML=html;}
function updateStep(s){
  for(let i=1;i<=4;i++){
    const d=document.getElementById(`dot${i}`);
    if(i<s){d.className='step-dot done';d.textContent='✓';}
    else if(i===s){d.className='step-dot active';d.textContent=i;}
    else{d.className='step-dot';d.textContent=i;}
  }
  for(let i=1;i<=3;i++) document.getElementById(`line${i}`).className=`step-line${i<s?' done':''}`;
}

// ── Flow ───────────────────────────────────────────────────────────
async function step0(){
  updateStep(1);
  showTyping(); await wait(900); removeTyping();
  await addBubble('你好！我是 <strong>AI购物代理</strong> 🤖<br><br>你只需要告诉我你的需求，<strong>我会替你完成全部选品、比较和下单流程</strong>。<br><br>你不需要自己做任何选择，<strong>最终买哪一款完全由我替你决定。</strong>');
  setAction(`
    <div class="notice"><strong>💡 温馨提示：</strong>在这个场景中，你把购买决策权完全交给AI。你只需提供需求，AI将自主完成评估、选品和下单，无需你做任何选择。</div>
    <div style="margin-top:12px">
      <div class="section-label">你的使用场景是？</div>
      <div class="option-grid">
        <button class="option-btn" onclick="pickScenario('通勤上班')">🚇 通勤上班</button>
        <button class="option-btn" onclick="pickScenario('运动健身')">🏃 运动健身</button>
        <button class="option-btn" onclick="pickScenario('居家办公')">🏠 居家办公</button>
        <button class="option-btn" onclick="pickScenario('影音娱乐')">🎬 影音娱乐</button>
      </div>
    </div>`);
}

async function pickScenario(v){
  state.scenario=v; setAction('');
  await addBubble(`使用场景：${v}`,true);
  showTyping(); await wait(600); removeTyping();
  await addBubble(`好的，<strong>${v}</strong> 场景已记录 ✅<br><br>请告诉我你的预算范围：`);
  setAction(`<div class="option-grid">
    <button class="option-btn" onclick="pickBudget('500元以下')">💰 500元以下</button>
    <button class="option-btn" onclick="pickBudget('500-1000元')">💰 500–1000元</button>
    <button class="option-btn" onclick="pickBudget('1000-2000元')">💰 1000–2000元</button>
    <button class="option-btn" onclick="pickBudget('2000元以上')">💰 2000元以上</button>
  </div>`);
}

async function pickBudget(v){
  state.budget=v; setAction('');
  await addBubble(`预算：${v}`,true);
  updateStep(2);
  showTyping(); await wait(600); removeTyping();
  await addBubble('最后：你最看重耳机哪个方面？');
  setAction(`<div class="option-grid">
    <button class="option-btn" onclick="pickPref('降噪效果')">🔇 降噪效果</button>
    <button class="option-btn" onclick="pickPref('音质表现')">🎵 音质表现</button>
    <button class="option-btn" onclick="pickPref('续航时长')">🔋 续航时长</button>
    <button class="option-btn" onclick="pickPref('佩戴舒适')">😊 佩戴舒适</button>
  </div>`);
}

async function pickPref(v){
  state.preference=v; setAction('');
  await addBubble(`最看重：${v}`,true);
  // Compute best product NOW so all downstream steps reference it
  state.finalProduct = getBestProduct(state.budget, state.scenario, state.preference);
  showAuthorize();
}

async function showAuthorize(){
  showTyping(); await wait(800); removeTyping();
  await addBubble('我已收到你的全部需求。现在，请<strong>授权我作为你的购物代理</strong>，接下来将由我完全替你完成选品和下单。');
  setAction(`
    <div class="auth-card">
      <div class="auth-title">📋 授权确认书</div>
      <div class="auth-row"><span>使用场景</span><span>${state.scenario}</span></div>
      <div class="auth-row"><span>预算范围</span><span>${state.budget}</span></div>
      <div class="auth-row"><span>首要关注</span><span>${state.preference}</span></div>
      <div class="auth-row"><span>决策权归属</span><span>授权给AI</span></div>
      <div class="auth-row" style="border:none;padding-top:10px;font-size:12px;color:#7C3AED;">我授权AI代替我完成全部选品与下单流程，无需我进一步确认。</div>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-primary" onclick="authorize()" style="width:100%">✅ 确认授权，让AI替我决定</button>
    </div>`);
}

async function authorize(){
  setAction('');
  await addBubble('我授权AI替我完成全部选品和下单。',true);
  runProcessing();
}

async function runProcessing(){
  updateStep(3);
  showTyping(); await wait(600); removeTyping();
  await addBubble('收到授权 ✅ 我现在开始自主处理，你无需进行任何操作……');

  const p = state.finalProduct;
  // Dynamic processing messages based on user's preferences
  const steps = [
    { icon:'🔍', text:`正在扫描平台全部蓝牙耳机商品……` },
    { icon:'📊', text:`正在按「${state.preference}」筛选符合「${state.budget}」的型号……` },
    { icon:'🧠', text:`正在结合「${state.scenario}」场景进行综合评估……` },
    { icon:'✅', text:`已选定最优方案，准备下单……` },
  ];

  const stepsHtml = steps.map((s,i)=>`
    <div class="process-step" id="ps${i}">
      <span class="process-icon">${s.icon}</span>${s.text}
    </div>`).join('');

  const w=document.createElement('div'); w.className='bubble-wrap'; w.style.animation='fadeUp 0.35s ease';
  w.innerHTML=`<div class="avatar">🤖</div>
    <div class="ai-process-box" style="flex:1" id="processBox">
      ${stepsHtml}
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>`;
  chatArea.appendChild(w);
  chatArea.scrollIntoView({behavior:'smooth',block:'end'});
  setAction('');

  const bar=document.getElementById('progressBar');
  for(let i=0;i<steps.length;i++){
    document.getElementById(`ps${i}`).className='process-step active';
    bar.style.width=`${(i+1)*25}%`;
    await wait(900);
    document.getElementById(`ps${i}`).className='process-step done';
    document.getElementById(`ps${i}`).querySelector('.process-icon').textContent='✓';
  }

  await wait(400);
  showResult();
}

async function showResult(){
  updateStep(4);
  const p=state.finalProduct;
  showTyping(); await wait(700); removeTyping();
  await addBubble(`评估完成！我已从平台同类耳机中综合评分，<strong>为你选定以下商品</strong>，将直接替你完成下单：`);

  const w=document.createElement('div'); w.className='bubble-wrap'; w.style.animation='fadeUp 0.35s ease';
  w.innerHTML=`<div class="avatar">🤖</div>
    <div class="result-card" style="flex:1">
      <div class="result-badge">🤖 AI已替你选定</div>
      <div class="result-name">${p.name}</div>
      <div class="result-meta">${p.meta}</div>
      <div class="result-price">${p.priceStr}</div>
      <div class="result-reason"><strong>选择理由：</strong>${p.reason}</div>
      <div class="result-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>`;
  chatArea.appendChild(w);
  chatArea.scrollIntoView({behavior:'smooth',block:'end'});

  await wait(500);
  showTyping(); await wait(700); removeTyping();
  await addBubble(`根据你的授权，我将<strong>直接替你下单</strong>，无需你再次确认。`);

  setAction(`
    <button class="btn btn-primary" onclick="aiPlaceOrder()" style="width:100%">🤖 AI替我下单（执行授权）</button>`);
}

async function aiPlaceOrder(){
  setAction('');
  showTyping(); await wait(1000); removeTyping();
  const p=state.finalProduct;
  const w=document.createElement('div'); w.className='bubble-wrap'; w.style.animation='fadeUp 0.35s ease';
  w.innerHTML=`<div class="avatar">🤖</div>
    <div class="success-box" style="flex:1">
      <div class="success-icon">✅</div>
      <div class="success-title">AI已替你完成下单！</div>
      <div class="success-sub">
        <strong>${p.name}</strong><br>${p.priceStr} · 预计3–5个工作日送达<br><br>
        本次购买由AI代理全权处理，<br>你无需做任何额外操作 🤖
      </div>
    </div>`;
  chatArea.appendChild(w);
  chatArea.scrollIntoView({behavior:'smooth',block:'end'});
  updateStep(5);
  setAction(`<div class="notice" style="background:#F0FDF4;border-color:#BBF7D0;border-left-color:#16A34A;color:#14532D;">
    <strong>✅ 体验完成！</strong><br>请返回见数问卷，继续完成接下来的量表作答。感谢你的参与！
  </div>`);
}

step0();
</script>
